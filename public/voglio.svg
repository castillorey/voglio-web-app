<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3eeff"/>
      <stop offset="100%" style="stop-color:#e8d9ff"/>
    </linearGradient>
    <linearGradient id="vg" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" style="stop-color:#a374ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!--
    V caligráfica inspirada en las referencias:
    - Brazo izquierdo: trazo grueso con serif curvo arriba y adelgaza hacia el centro
    - Brazo derecho: trazo delgado que sube y termina con un pequeño flourish/curl
    - Inspiración: fila 3 col 1 y fila 2 col 3 de la imagen
  -->

  <!-- Brazo izquierdo: trazo grueso, entra con serif curvo desde arriba izquierda -->
  <!-- Serif entrada izquierda: pequeño curl horizontal -->
  <path d="M 12 14
           C 10 12, 13 11, 15 13
           C 18 17, 24 28, 32 47"
        stroke="url(#vg)"
        stroke-width="5.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="1"/>

  <!-- Brazo derecho: trazo más delgado, con flourish/curl arriba -->
  <!-- Curl decorativo en la parte superior derecha -->
  <path d="M 32 47
           C 40 28, 46 17, 49 13
           C 51 10, 54 10, 53 13
           C 52 15, 50 14, 50 12"
        stroke="url(#vg)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Estrella dorada en el vértice -->
  <g transform="translate(32, 47)">
    <path d="M0,-6.5 L1.7,-1.7 L6.5,0 L1.7,1.7 L0,6.5 L-1.7,1.7 L-6.5,0 L-1.7,-1.7 Z"
          fill="#FFB347"/>
    <circle cx="0" cy="0" r="1.8" fill="#fff" opacity="0.55"/>
  </g>

</svg>
